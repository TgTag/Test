<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniFlow | News Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
    * {
    margin: 0; 
    padding: 0; 
    box-sizing: border-box;
    font-family: 'Space Grotesk', sans-serif;
  }
  
  :root {
    --bg: #f5f5f7;
    --text: #1d1d1f;
    --text-sec: #6e6e73;
    --glass: rgba(255, 255, 255, 0.6);
    --glass-hover: rgba(255, 255, 255, 0.8);
    --border: rgba(0, 0, 0, 0.08);
    --accent: #1d1d1f;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Same BG Shapes */
  .bg-shapes {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    overflow: hidden;
  }
  .shape {
    position: absolute;
    border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    background: linear-gradient(135deg, #e8e8ed, #ffffff);
    animation: morph 15s ease-in-out infinite;
  }
  .shape1 { width: 500px; height: 500px; top: -200px; left: -200px; }
  .shape2 { width: 400px; height: 400px; bottom: -150px; right: -150px; animation-delay: -5s; }
  
  @keyframes morph {
    0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
    50% { border-radius: 70% 30% 50% / 30% 30% 70% 70%; transform: rotate(180deg); }
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* Glass Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 28px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 20px;
  }
  
  .logo {
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
  }
  .logo i { font-size: 28px; }

  /* Search + Filter Bar */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
  }

  .search-box {
    position: relative;
    min-width: 250px;
  }
  .search-box input {
    width: 100%;
    padding: 12px 20px 12px 48px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
  }
  .search-box input:focus { background: var(--glass-hover); }
  .search-box i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-sec);
  }

  .filter-btn {
    padding: 12px 24px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #fff;
    transform: translateY(-2px);
  }

  /* News Grid */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 28px;
  }

  .news-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: 0.4s;
    display: flex;
    flex-direction: column;
  }
  .news-card:hover { transform: translateY(-8px); }

  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    background-size: cover;
    background-position: center;
  }

  .card-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .card-meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-sec);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .card-meta span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-body h3 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-body p {
    font-size: 15px;
    color: var(--text-sec);
    line-height: 1.6;
    margin-bottom: 20px;
    flex: 1;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .like-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .like-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .like-btn:active { transform: scale(0.95); }

  .view-count {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: var(--text-sec);
    font-weight: 600;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-size: 18px;
    color: var(--text-sec);
  }

  @media (max-width: 768px) {
    header { flex-direction: column; align-items: stretch; }
    .controls { justify-content: stretch; }
    .search-box { min-width: 100%; }
    .news-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
  </div>

  <div class="container">
    <header>
      <a href="index.html" class="logo">
        <i class="ph-fill ph-tornado"></i>
        AniFlow
      </a>
      
      <div class="controls">
        <div class="search-box">
          <i class="ph-bold ph-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Search news...">
        </div>
        <button class="filter-btn active" data-filter="all">
          <i class="ph-fill ph-squares-four"></i> All
        </button>
        <button class="filter-btn" data-filter="Anime">
          <i class="ph-fill ph-television"></i> Anime
        </button>
        <button class="filter-btn" data-filter="Manga">
          <i class="ph-fill ph-book-open"></i> Manga
        </button>
        <button class="filter-btn" data-filter="Movie">
          <i class="ph-fill ph-film-strip"></i> Movie
        </button>
      </div>
    </header>

    <div class="news-grid" id="newsGrid">
      <div class="loading">Loading news...</div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  
  // TUMHARA SUPABASE YAHAN DAALO
  const SUPABASE_URL = 'https://xyzcompany.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  let allNews = []
  let allStats = []
  let currentFilter = 'all'

  async function init() {
    // 1. news.json se static data - CDN se fast
    try {
      const newsRes = await fetch('/news.json?t=' + Date.now())
      allNews = await newsRes.json()
    } catch(e) {
      document.getElementById('newsGrid').innerHTML = '<div class="loading">news.json not found</div>'
      return
    }
    
    // 2. Supabase se views/likes
    const { data: stats } = await supabase.from('news_stats').select('*')
    allStats = stats || []
    
    renderNews()
    setupRealtime()
    setupFilters()
    setupSearch()
  }

  function renderNews() {
    const grid = document.getElementById('newsGrid')
    const searchTerm = document.getElementById('searchInput').value.toLowerCase()
    
    let filtered = allNews.filter(post => {
      const matchFilter = currentFilter === 'all' || post.tag === currentFilter
      const matchSearch = post.title.toLowerCase().includes(searchTerm) || post.desc.toLowerCase().includes(searchTerm)
      return matchFilter && matchSearch
    })

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="loading">No news found</div>'
      return
    }

    grid.innerHTML = ''
    filtered.forEach(post => {
      const stat = allStats.find(s => s.news_id === post.id) || { views: 0, likes: 0 }
      
      grid.innerHTML += `
        <article class="news-card" data-id="${post.id}">
          <div class="card-img" style="background-image: url('${post.img}')"></div>
          <div class="card-body">
            <div class="card-meta">
              <span><i class="ph-fill ph-tag"></i> ${post.tag}</span>
              <span><i class="ph-bold ph-calendar"></i> ${post.date}</span>
            </div>
            <h3>${post.title}</h3>
            <p>${post.desc}</p>
            <div class="card-footer">
              <button class="like-btn" data-id="${post.id}">
                <i class="ph-fill ph-heart"></i>
                <span class="like-count">${stat.likes}</span>
              </button>
              <span class="view-count">
                <i class="ph-bold ph-eye"></i>
                <span class="view-num">${stat.views}</span>
              </span>
            </div>
          </div>
        </article>
      `
      
      // View +1 karo background me
      supabase.from('news_stats').upsert({ 
        news_id: post.id, 
        views: stat.views + 1,
        likes: stat.likes 
      })
    })
  }

  // Like button
  document.addEventListener('click', async (e) => {
    if(e.target.closest('.like-btn')) {
      const btn = e.target.closest('.like-btn')
      const id = parseInt(btn.dataset.id)
      const card = btn.closest('.news-card')
      const likeSpan = card.querySelector('.like-count')
      const stat = allStats.find(s => s.news_id === id) || { views: 0, likes: 0 }
      
      const newLikes = stat.likes + 1
      likeSpan.textContent = newLikes
      
      await supabase.from('news_stats').upsert({ 
        news_id: id, 
        likes: newLikes,
        views: stat.views
      })
    }
  })

  // Real time update
  function setupRealtime() {
    supabase
      .channel('stats-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'news_stats' }, payload => {
        const stat = payload.new
        const index = allStats.findIndex(s => s.news_id === stat.news_id)
        if (index > -1) allStats[index] = stat
        else allStats.push(stat)
        
        const card = document.querySelector(`[data-id="${stat.news_id}"]`)
        if(card) {
          card.querySelector('.view-num').textContent = stat.views
          card.querySelector('.like-count').textContent = stat.likes
        }
      })
      .subscribe()
  }

  // Filter buttons
  function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentFilter = btn.dataset.filter
        renderNews()
      })
    })
  }

  // Search
  function setupSearch() {
    document.getElementById('searchInput').addEventListener('input', () => {
      renderNews()
    })
  }

  init()
</script>
</body>
    </html>
